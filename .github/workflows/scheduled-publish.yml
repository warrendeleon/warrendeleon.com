name: Scheduled publish

on:
  schedule:
    - cron: '30 7 * * *'  # 8:30am BST / 7:30am GMT
  workflow_dispatch: # allow manual trigger

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx astro build

      - name: Deploy to IONOS
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.IONOS_USER }},${{ secrets.IONOS_PASSWORD }}" \
            -e "set ssl:verify-certificate no; set sftp:auto-confirm yes; mirror -R --delete --exclude email/ dist/ clickandbuilds/warrendeleon/; quit" \
            sftp://${{ secrets.IONOS_HOST }}

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Cross-post new articles to dev.to
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          SITE_URL="https://warrendeleon.com"

          for FILE in src/content/blog/*.md; do
            # Skip drafts
            grep -q '^draft: true' "$FILE" && continue

            # Only English posts (no locale subdirectories)
            LOCALE=$(sed -n 's/^locale: *//p' "$FILE")
            [ "$LOCALE" != "en" ] && continue

            # Check publish date matches today
            PUB_DATE=$(sed -n 's/^publishDate: *//p' "$FILE")
            [ "$PUB_DATE" != "$TODAY" ] && continue

            SLUG=$(basename "$FILE" .md)
            CANONICAL="${SITE_URL}/blog/${SLUG}/"

            # Check if already posted to dev.to
            EXISTS=$(curl -s "https://dev.to/api/articles/me/all?per_page=100" \
              -H "api-key: ${{ secrets.DEVTO_API_KEY }}" \
              | python3 -c "import sys,json;articles=json.load(sys.stdin);print('yes' if any(a.get('canonical_url','')=='${CANONICAL}' for a in articles) else 'no')" 2>/dev/null)

            [ "$EXISTS" = "yes" ] && echo "Already on dev.to: $SLUG" && continue

            # Extract frontmatter
            TITLE=$(sed -n 's/^title: "\(.*\)"/\1/p' "$FILE")
            DESCRIPTION=$(sed -n 's/^description: "\(.*\)"/\1/p' "$FILE")
            HERO=$(sed -n 's/^heroImage: "\(.*\)"/\1/p' "$FILE")
            TAGS_RAW=$(sed -n 's/^tags: \[\(.*\)\]/\1/p' "$FILE")
            TAGS=$(echo "$TAGS_RAW" | sed 's/"//g' | sed 's/-//g')
            COVER="${SITE_URL}${HERO}"

            # Extract body and make URLs absolute
            BODY=$(awk 'BEGIN{n=0} /^---$/{n++; next} n>=2{print}' "$FILE")
            BODY=$(echo "$BODY" | sed "s|](/|](${SITE_URL}/|g")

            # Publish
            JSON=$(python3 -c "
          import json, sys
          body = sys.stdin.read()
          article = {
              'article': {
                  'title': '''${TITLE}''',
                  'body_markdown': body,
                  'published': True,
                  'description': '''${DESCRIPTION}''',
                  'tags': [t.strip() for t in '''${TAGS}'''.split(',')],
                  'canonical_url': '${CANONICAL}',
                  'main_image': '${COVER}'
              }
          }
          print(json.dumps(article))
          " <<< "$BODY")

            RESPONSE=$(curl -s -X POST "https://dev.to/api/articles" \
              -H "api-key: ${{ secrets.DEVTO_API_KEY }}" \
              -H "Content-Type: application/json" \
              -d "$JSON")

            URL=$(echo "$RESPONSE" | python3 -c "import sys,json;print(json.load(sys.stdin).get('url','FAILED'))" 2>/dev/null)
            echo "Published to dev.to: $URL"
          done
