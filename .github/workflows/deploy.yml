name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx astro build

      - name: Deploy to IONOS
        env:
          SSHPASS: ${{ secrets.IONOS_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          sshpass -e rsync -avz --exclude='email/' --delete \
            -e 'ssh -o StrictHostKeyChecking=no -o PreferredAuthentications=password' \
            dist/ ${{ secrets.IONOS_USER }}@${{ secrets.IONOS_HOST }}:clickandbuilds/warrendeleon/

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
