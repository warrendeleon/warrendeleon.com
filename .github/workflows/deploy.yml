name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx astro build

      - name: Deploy to IONOS
        env:
          IONOS_USER: ${{ secrets.IONOS_USER }}
          IONOS_PASS: ${{ secrets.IONOS_PASSWORD }}
          IONOS_HOST: ${{ secrets.IONOS_HOST }}
        run: |
          sudo apt-get install -y lftp
          python3 -c "
          import os
          user=os.environ['IONOS_USER']
          pw=os.environ['IONOS_PASS']
          host=os.environ['IONOS_HOST']
          script=f'''set ssl:verify-certificate no
          set sftp:auto-confirm yes
          open -u {user},{pw} sftp://{host}
          mirror -R --delete --exclude email/ dist/ clickandbuilds/warrendeleon/
          quit
          '''
          with open('/tmp/lftp-script.txt','w') as f: f.write(script)
          "
          lftp -f /tmp/lftp-script.txt
          rm -f /tmp/lftp-script.txt

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "X-Auth-Email: ${{ secrets.CF_EMAIL }}" \
            -H "X-Auth-Key: ${{ secrets.CF_API_KEY }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
